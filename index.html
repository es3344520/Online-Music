<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 我的音乐库</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            font-weight: 300;
            font-size: 2.2em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 0.9em;
            margin-bottom: 30px;
        }

        /* ===== 播放器 ===== */
        .player {
            background: rgba(255,255,255,0.04);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.06);
            backdrop-filter: blur(10px);
        }
        
        .cover {
            width: 160px;
            height: 160px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 16px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            box-shadow: 0 20px 60px rgba(102, 126, 234, 0.25);
            transition: all 0.3s;
        }
        
        .cover.playing {
            animation: pulse 2s ease-in-out infinite;
            box-shadow: 0 20px 60px rgba(102, 126, 234, 0.4);
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }
        
        .track-info {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .track-title {
            font-size: 1.4em;
            font-weight: 500;
            margin-bottom: 6px;
            color: #fff;
        }
        
        .track-artist {
            color: #888;
            font-size: 0.95em;
        }

        /* 进度条 */
        .progress-area {
            margin-bottom: 8px;
        }
        
        .progress-bar {
            width: 100%;
            height: 5px;
            background: rgba(255,255,255,0.08);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .progress {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px;
            transition: width 0.1s linear;
        }
        
        .time {
            display: flex;
            justify-content: space-between;
            font-size: 0.75em;
            color: #666;
            margin-bottom: 20px;
        }

        /* 控制按钮 */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }
        
        .btn {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 1.6em;
            padding: 10px;
            transition: all 0.2s;
            border-radius: 50%;
        }
        
        .btn:hover {
            color: #fff;
            transform: scale(1.15);
        }
        
        .btn-play {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            font-size: 1.8em;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.3);
        }
        
        .btn-play:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 40px rgba(102, 126, 234, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* ===== 播放列表 ===== */
        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            color: #888;
            font-size: 0.85em;
        }
        
        .playlist {
            background: rgba(255,255,255,0.02);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.04);
        }
        
        .song-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px 20px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        
        .song-item:last-child {
            border-bottom: none;
        }
        
        .song-item:hover {
            background: rgba(255,255,255,0.04);
        }
        
        .song-item.active {
            background: linear-gradient(90deg, rgba(102,126,234,0.15), transparent);
            border-left: 3px solid #667eea;
        }
        
        .song-num {
            width: 28px;
            text-align: center;
            color: #555;
            font-size: 0.8em;
            font-variant-numeric: tabular-nums;
        }
        
        .song-item.active .song-num {
            color: #667eea;
        }
        
        .song-info {
            flex: 1;
            min-width: 0;
        }
        
        .song-title {
            font-size: 0.95em;
            color: #ddd;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 3px;
        }
        
        .song-item.active .song-title {
            color: #fff;
        }
        
        .song-artist {
            font-size: 0.8em;
            color: #666;
        }
        
        .song-type {
            color: #444;
            font-size: 0.7em;
            padding: 2px 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
        }

        /* ===== 分页 ===== */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            padding: 20px;
        }
        
        .page-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: #aaa;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9em;
        }
        
        .page-btn:hover:not(:disabled) {
            background: rgba(102,126,234,0.2);
            color: #fff;
            border-color: rgba(102,126,234,0.3);
        }
        
        .page-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .page-info {
            color: #666;
            font-size: 0.9em;
        }

        /* ===== 状态提示 ===== */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .error {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9em;
        }
        
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #555;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            h1 { font-size: 1.6em; }
            .player { padding: 20px; }
            .cover { width: 120px; height: 120px; font-size: 48px; }
            .controls { gap: 20px; }
            .btn-play { width: 56px; height: 56px; font-size: 1.5em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 我的音乐库</h1>
        <p class="subtitle">存储在 Cloudflare R2</p>
        
        <div id="errorBox"></div>

        <!-- 播放器 -->
        <div class="player">
            <div class="cover" id="cover">🎶</div>
            <div class="track-info">
                <div class="track-title" id="trackTitle">加载中...</div>
                <div class="track-artist" id="trackArtist">正在连接 R2...</div>
            </div>
            
            <div class="progress-area">
                <div class="progress-bar" id="progressBar">
                    <div class="progress" id="progress"></div>
                </div>
            </div>
            <div class="time">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
            
            <div class="controls">
                <button class="btn" id="prevBtn" title="上一首">⏮</button>
                <button class="btn btn-play" id="playBtn" title="播放/暂停">▶</button>
                <button class="btn" id="nextBtn" title="下一首">⏭</button>
            </div>
        </div>

        <!-- 播放列表 -->
        <div class="playlist-header">
            <span>歌曲列表</span>
            <span id="listInfo">加载中...</span>
        </div>
        <div class="playlist" id="playlist">
            <div class="loading">
                <div class="spinner"></div>
                <p>正在扫描 R2 音乐库...</p>
            </div>
        </div>
        
        <!-- 分页 -->
        <div class="pagination" id="pagination"></div>
    </div>

    <audio id="audio" preload="none"></audio>

    <script>
        // ===== 配置 =====
        const API_BASE = ''; // 同域，留空
        
        // ===== 状态 =====
        let songs = [];
        let currentPage = 1;
        let totalPages = 1;
        let currentIndex = -1;  // 当前播放的在 songs 中的索引
        let currentPageOffset = 0; // 当前页在全局中的偏移量
        let isPlaying = false;
        let currentUrl = null;

        // ===== DOM =====
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');
        const progress = document.getElementById('progress');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const trackTitle = document.getElementById('trackTitle');
        const trackArtist = document.getElementById('trackArtist');
        const cover = document.getElementById('cover');
        const playlistEl = document.getElementById('playlist');
        const listInfo = document.getElementById('listInfo');
        const paginationEl = document.getElementById('pagination');
        const errorBox = document.getElementById('errorBox');

        // ===== 工具函数 =====
        function showError(msg) {
            errorBox.innerHTML = `<div class="error">${msg}</div>`;
        }
        
        function clearError() {
            errorBox.innerHTML = '';
        }
        
        function formatTime(s) {
            if (!s || isNaN(s) || !isFinite(s)) return '0:00';
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec.toString().padStart(2, '0')}`;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ===== 加载歌单（分页） =====
        async function loadPage(page) {
            clearError();
            playlistEl.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>加载中...</p>
                </div>
            `;
            
            try {
                const res = await fetch(`${API_BASE}/api/list?page=${page}`);
                const data = await res.json();
                
                if (data.error) throw new Error(data.error);
                
                songs = data.songs;
                currentPage = data.page;
                totalPages = data.total_pages;
                currentPageOffset = (currentPage - 1) * data.page_size;
                
                listInfo.textContent = `共 ${data.total} 首 · 第 ${currentPage}/${totalPages} 页`;
                
                if (songs.length === 0) {
                    playlistEl.innerHTML = '<div class="empty">暂无音乐文件</div>';
                } else {
                    renderPlaylist();
                }
                
                renderPagination();
                
            } catch (err) {
                showError('加载失败: ' + err.message);
                playlistEl.innerHTML = '<div class="empty">加载失败，请刷新重试</div>';
            }
        }

        // ===== 渲染播放列表 =====
        function renderPlaylist() {
            playlistEl.innerHTML = '';
            
            songs.forEach((song, idx) => {
                const globalIndex = currentPageOffset + idx;
                const isActive = globalIndex === currentIndex;
                
                const item = document.createElement('div');
                item.className = 'song-item' + (isActive ? ' active' : '');
                item.innerHTML = `
                    <span class="song-num">${isActive && isPlaying ? '▶' : (currentPageOffset + idx + 1)}</span>
                    <div class="song-info">
                        <div class="song-title">${escapeHtml(song.title)}</div>
                        <div class="song-artist">${escapeHtml(song.artist)}</div>
                    </div>
                    <span class="song-type">${song.file.split('.').pop().toUpperCase()}</span>
                `;
                item.addEventListener('click', () => playSong(globalIndex, song));
                playlistEl.appendChild(item);
            });
        }

        // ===== 渲染分页 =====
        function renderPagination() {
            if (totalPages <= 1) {
                paginationEl.innerHTML = '';
                return;
            }
            
            paginationEl.innerHTML = `
                <button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>
                    ← 上一页
                </button>
                <span class="page-info">${currentPage} / ${totalPages}</span>
                <button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>
                    下一页 →
                </button>
            `;
        }

        window.changePage = function(page) {
            if (page < 1 || page > totalPages) return;
            loadPage(page);
        };

        // ===== 播放歌曲 =====
        async function playSong(globalIndex, song) {
            clearError();
            
            // 点击当前播放的歌曲 → 暂停/继续
            if (currentIndex === globalIndex && currentUrl) {
                togglePlay();
                return;
            }
            
            // 更新状态
            currentIndex = globalIndex;
            trackTitle.textContent = song.title;
            trackArtist.textContent = song.artist;
            cover.textContent = '🎵';
            playBtn.textContent = '⏳';
            
            // 重新渲染列表高亮
            renderPlaylist();
            
            try {
                // 获取预签名链接
                const res = await fetch(`${API_BASE}/api/play?file=${encodeURIComponent(song.file)}`);
                const data = await res.json();
                
                if (data.error) throw new Error(data.error);
                
                currentUrl = data.url;
                audio.src = currentUrl;
                audio.load();
                
                await audio.play();
                isPlaying = true;
                playBtn.textContent = '⏸';
                cover.classList.add('playing');
                cover.textContent = '🔊';
                
            } catch (err) {
                showError('播放失败: ' + err.message);
                playBtn.textContent = '▶';
                isPlaying = false;
                cover.classList.remove('playing');
            }
        }

        // ===== 播放控制 =====
        function togglePlay() {
            if (!audio.src) {
                // 没加载过，播放第一首
                if (songs.length > 0) {
                    playSong(currentPageOffset, songs[0]);
                }
                return;
            }
            
            if (isPlaying) {
                audio.pause();
                playBtn.textContent = '▶';
                cover.classList.remove('playing');
                cover.textContent = '⏸';
            } else {
                audio.play();
                playBtn.textContent = '⏸';
                cover.classList.add('playing');
                cover.textContent = '🔊';
            }
            isPlaying = !isPlaying;
            renderPlaylist(); // 更新播放图标
        }

        function prevSong() {
            if (currentIndex <= 0) return;
            // 需要知道上一首在哪一页
            // 简单处理：如果上一首在当前页，直接播放；否则加载对应页
            const prevGlobalIndex = currentIndex - 1;
            const prevPage = Math.floor(prevGlobalIndex / 10) + 1;
            const prevLocalIndex = prevGlobalIndex % 10;
            
            if (prevPage !== currentPage) {
                loadPage(prevPage).then(() => {
                    if (songs[prevLocalIndex]) {
                        playSong(prevGlobalIndex, songs[prevLocalIndex]);
                    }
                });
            } else {
                if (songs[prevLocalIndex]) {
                    playSong(prevGlobalIndex, songs[prevLocalIndex]);
                }
            }
        }

        function nextSong() {
            const nextGlobalIndex = currentIndex + 1;
            const nextPage = Math.floor(nextGlobalIndex / 10) + 1;
            const nextLocalIndex = nextGlobalIndex % 10;
            
            if (nextPage !== currentPage) {
                loadPage(nextPage).then(() => {
                    if (songs[nextLocalIndex]) {
                        playSong(nextGlobalIndex, songs[nextLocalIndex]);
                    }
                });
            } else {
                if (songs[nextLocalIndex]) {
                    playSong(nextGlobalIndex, songs[nextLocalIndex]);
                }
            }
        }

        // ===== 事件绑定 =====
        playBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', prevSong);
        nextBtn.addEventListener('click', nextSong);
        
        audio.addEventListener('timeupdate', () => {
            const pct = (audio.currentTime / audio.duration) * 100 || 0;
            progress.style.width = pct + '%';
            currentTimeEl.textContent = formatTime(audio.currentTime);
            durationEl.textContent = formatTime(audio.duration);
        });
        
        audio.addEventListener('ended', () => {
            nextSong();
        });
        
        audio.addEventListener('error', () => {
            showError('音频加载失败，链接可能已过期');
            isPlaying = false;
            playBtn.textContent = '▶';
            cover.classList.remove('playing');
        });
        
        progressBar.addEventListener('click', (e) => {
            if (!audio.duration) return;
            const rect = progressBar.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            audio.currentTime = pct * audio.duration;
        });

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            
            switch(e.code) {
                case 'Space':
                    e.preventDefault();
                    togglePlay();
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    prevSong();
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    nextSong();
                    break;
            }
        });

        // ===== 初始化 =====
        loadPage(1);
    </script>
</body>
</html>
