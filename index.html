<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🎵 R2 音乐播放器</title>
    
    <!-- jPlayer 依赖 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jplayer/2.9.2/skin/blue.monday/jplayer.blue.monday.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jplayer/2.9.2/jplayer.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #f5f7fb;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 16px 40px;
        }
        .container {
            max-width: 720px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
            padding: 24px 20px 32px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            width: 100%;
        }
        .search-box input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #e8edf5;
            border-radius: 30px;
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
            background: #f8faff;
            color: #1f2a44;
        }
        .search-box input:focus {
            border-color: #3b82f6;
            background: white;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .search-box input::placeholder {
            color: #8892aa;
        }
        .search-box .clear-btn {
            background: #eef2f7;
            border: none;
            border-radius: 30px;
            padding: 0 18px;
            font-size: 1.2rem;
            cursor: pointer;
            color: #5e6f8d;
            transition: 0.15s;
            display: none;
            align-items: center;
        }
        .search-box .clear-btn:hover {
            background: #dce2ec;
        }
        .search-box .clear-btn.visible {
            display: flex;
        }
        .search-results-info {
            font-size: 0.85rem;
            color: #5e6f8d;
            margin-bottom: 16px;
            display: none;
        }
        .search-results-info.visible {
            display: block;
        }
        
        /* jPlayer 播放器样式覆盖 */
        .player-card {
            background: #f8faff;
            border-radius: 24px;
            padding: 20px 16px 18px;
            margin-bottom: 28px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02), 0 4px 12px rgba(0,20,50,0.04);
        }
        .now-playing {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }
        .track-name {
            font-weight: 500;
            font-size: 1.1rem;
            color: #0b1e33;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 80%;
        }
        
        /* 覆盖 jPlayer 默认样式以匹配设计 */
        .jp-audio {
            margin: 0 auto;
            max-width: 100%;
        }
        .jp-audio .jp-type-single .jp-interface {
            background: transparent;
            padding: 0;
        }
        .jp-audio .jp-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 0;
        }
        .jp-audio .jp-controls button {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
            color: #1f2a44;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: 0.15s;
            text-indent: 0;
            line-height: 1;
        }
        .jp-audio .jp-controls button:active {
            transform: scale(0.88);
            background: rgba(0,0,0,0.05);
        }
        .jp-audio .jp-controls button.jp-play,
        .jp-audio .jp-controls button.jp-pause {
            font-size: 2rem;
            width: 56px;
            height: 56px;
            background: #3b82f6;
            color: white;
            border-radius: 50%;
        }
        .jp-audio .jp-controls button.jp-play:active,
        .jp-audio .jp-controls button.jp-pause:active {
            background: #2563eb;
        }
        .jp-audio .jp-progress {
            background: #e8edf5;
            border-radius: 10px;
            height: 6px;
            margin: 8px 0;
            overflow: hidden;
        }
        .jp-audio .jp-progress .jp-seek-bar {
            background: transparent;
            height: 100%;
            cursor: pointer;
        }
        .jp-audio .jp-progress .jp-play-bar {
            background: #3b82f6;
            height: 100%;
            border-radius: 10px;
        }
        .jp-audio .jp-time-holder {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #5e6f8d;
            padding: 4px 0;
        }
        .jp-audio .jp-volume-bar {
            background: #e8edf5;
            border-radius: 10px;
            height: 4px;
            width: 60px;
        }
        .jp-audio .jp-volume-bar .jp-volume-bar-value {
            background: #3b82f6;
            border-radius: 10px;
            height: 100%;
        }
        
        .file-list-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin: 18px 0 12px;
        }
        .file-list-header span {
            font-size: 0.95rem;
            color: #1f2a44;
        }
        .badge {
            background: #e8edf5;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #2a3d5e;
        }
        .file-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 6px 0 20px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #ffffff;
            padding: 12px 16px;
            border-radius: 18px;
            border: 1px solid #edf2f9;
            transition: all 0.15s;
        }
        .file-item:active {
            background: #eef4ff;
            border-color: #b3c9ff;
        }
        .file-item.active {
            background: #eef4ff;
            border-color: #3b82f6;
        }
        .file-item .file-name {
            font-size: 0.95rem;
            color: #1f2a44;
            font-weight: 450;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 60%;
        }
        .file-item .file-name .highlight {
            background: #fef3c7;
            padding: 0 2px;
            border-radius: 2px;
        }
        .file-item .play-btn {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            min-width: 70px;
        }
        .file-item .play-btn:active {
            transform: scale(0.94);
            background: #2563eb;
        }
        .file-item .play-btn.playing {
            background: #1e293b;
        }
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .pagination button {
            background: white;
            border: 1px solid #dce2ec;
            padding: 8px 18px;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.9rem;
            color: #1f2a44;
            cursor: pointer;
            transition: 0.12s;
        }
        .pagination button:active {
            background: #eef2f7;
            transform: scale(0.94);
        }
        .pagination button:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .page-indicator {
            font-size: 0.95rem;
            background: #eef2f7;
            padding: 6px 18px;
            border-radius: 40px;
            color: #1a2b44;
            font-weight: 450;
            min-width: 80px;
            text-align: center;
        }
        .loading-spinner {
            text-align: center;
            padding: 30px 0;
            color: #5b6f8d;
        }
        .spinner {
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 3px solid #d0d9e8;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .no-results {
            text-align: center;
            padding: 30px 0;
            color: #8892aa;
            font-size: 0.95rem;
            display: none;
        }
        .no-results.visible {
            display: block;
        }
        
        /* 模式按钮 */
        .mode-btn {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 0 8px;
            color: #1f2a44;
            transition: 0.15s;
        }
        .mode-btn:active {
            transform: scale(0.88);
        }
        .mode-btn.mode-active {
            color: #3b82f6;
        }
        
        @media (max-width: 480px) {
            .container { padding: 16px; }
            .file-item { padding: 10px 12px; }
            .file-item .file-name { max-width: 50%; font-size: 0.9rem; }
            .search-box input { font-size: 0.9rem; padding: 10px 14px; }
            .jp-audio .jp-controls button { font-size: 1.2rem; width: 40px; height: 40px; }
            .jp-audio .jp-controls button.jp-play,
            .jp-audio .jp-controls button.jp-pause { font-size: 1.6rem; width: 48px; height: 48px; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- 搜索栏 -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 搜索歌曲..." autocomplete="off">
        <button class="clear-btn" id="clearSearchBtn" title="清除搜索">✕</button>
    </div>
    <div class="search-results-info" id="searchResultsInfo">找到 <span id="searchCount">0</span> 首歌曲</div>

    <!-- jPlayer 播放器卡片 -->
    <div class="player-card" id="playerCard">
        <div class="now-playing">
            <span class="track-name" id="currentTrackName">🎧 未选择</span>
        </div>
        
        <div id="jplayer"></div>
        
        <div class="jp-audio" role="application" aria-label="media player">
            <div class="jp-type-single">
                <div class="jp-gui jp-interface">
                    <div class="jp-controls">
                        <button class="mode-btn" id="modeBtn" title="播放模式">🔁</button>
                        <button class="jp-previous" tabindex="0">⏮</button>
                        <button class="jp-play" tabindex="0">▶</button>
                        <button class="jp-pause" tabindex="0">⏸</button>
                        <button class="jp-next" tabindex="0">⏭</button>
                    </div>
                    <div class="jp-progress">
                        <div class="jp-seek-bar">
                            <div class="jp-play-bar"></div>
                        </div>
                    </div>
                    <div class="jp-time-holder">
                        <span class="jp-current-time"></span>
                        <span class="jp-duration"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 文件列表 -->
    <div class="file-list-header">
        <span>🎵 歌曲列表</span>
        <span class="badge" id="totalBadge">0 首</span>
    </div>

    <div id="fileListContainer">
        <div class="loading-spinner" id="loadingIndicator">
            <span class="spinner"></span> 加载列表中...
        </div>
        <div id="fileList" class="file-grid" style="display:none;"></div>
        <div class="no-results" id="noResults">😕 没有找到匹配的歌曲</div>
    </div>

    <!-- 分页 -->
    <div class="pagination" id="paginationControls">
        <button id="prevPageBtn" disabled>◀ 上一页</button>
        <span class="page-indicator" id="pageIndicator">1 / 1</span>
        <button id="nextPageBtn" disabled>下一页 ▶</button>
    </div>
</div>

<script>
(function() {
    "use strict";

    const PAGE_SIZE = 10;
    const fileListEl = document.getElementById('fileList');
    const loadingEl = document.getElementById('loadingIndicator');
    const totalBadge = document.getElementById('totalBadge');
    const currentTrackName = document.getElementById('currentTrackName');
    const prevPageBtn = document.getElementById('prevPageBtn');
    const nextPageBtn = document.getElementById('nextPageBtn');
    const pageIndicator = document.getElementById('pageIndicator');
    const searchInput = document.getElementById('searchInput');
    const clearSearchBtn = document.getElementById('clearSearchBtn');
    const searchResultsInfo = document.getElementById('searchResultsInfo');
    const searchCount = document.getElementById('searchCount');
    const noResults = document.getElementById('noResults');
    const modeBtn = document.getElementById('modeBtn');

    let allFiles = [];
    let filteredFiles = [];
    let currentPage = 0;
    let totalPages = 0;
    let currentTrackIndex = -1;
    let searchQuery = '';
    let playMode = 'sequential';
    let currentFilePath = '';

    // ============ 工具函数 ============
    function getDisplayName(fullPath) {
        if (!fullPath) return '未知';
        return fullPath.split('/').pop() || fullPath;
    }

    function getFileList() {
        return searchQuery ? filteredFiles : allFiles;
    }

    // ============ API 请求 ============
    async function fetchFileList() {
        loadingEl.style.display = 'block';
        fileListEl.style.display = 'none';

        const response = await fetch('/api/music?action=list&t=' + Date.now());
        const data = await response.json();
        allFiles = (data.files || []).filter(f => typeof f === 'string' && f.trim().length > 0);
        allFiles.sort((a, b) => a.localeCompare(b));

        totalBadge.textContent = allFiles.length + ' 首';
        currentPage = 0;
        totalPages = Math.ceil(allFiles.length / PAGE_SIZE) || 1;
        renderPage(0);
        updatePagination();

        loadingEl.style.display = 'none';
        fileListEl.style.display = 'flex';
    }

    async function getPresignedUrl(filePath) {
        const resp = await fetch('/api/music?action=sign&file=' + encodeURIComponent(filePath) + '&t=' + Date.now());
        const data = await resp.json();
        return data.url;
    }

    // ============ 渲染列表 ============
    function renderPage(page) {
        const list = getFileList();
        const start = page * PAGE_SIZE;
        const end = Math.min(start + PAGE_SIZE, list.length);
        const pageFiles = list.slice(start, end);

        fileListEl.innerHTML = '';
        if (pageFiles.length === 0) {
            fileListEl.innerHTML = '<div style="padding:20px;text-align:center;color:#6b7f9f;">没有歌曲</div>';
            return;
        }

        for (const filePath of pageFiles) {
            const displayName = getDisplayName(filePath);
            const globalIndex = allFiles.indexOf(filePath);
            const item = document.createElement('div');
            item.className = 'file-item';
            if (globalIndex === currentTrackIndex) {
                item.classList.add('active');
            }

            const nameSpan = document.createElement('span');
            nameSpan.className = 'file-name';
            nameSpan.title = filePath;
            
            if (searchQuery) {
                const lowerName = displayName.toLowerCase();
                const idx = lowerName.indexOf(searchQuery);
                if (idx !== -1) {
                    nameSpan.innerHTML = displayName.substring(0, idx) + 
                        '<span class="highlight">' + displayName.substring(idx, idx + searchQuery.length) + '</span>' + 
                        displayName.substring(idx + searchQuery.length);
                } else {
                    nameSpan.textContent = displayName;
                }
            } else {
                nameSpan.textContent = displayName;
            }

            const playBtn = document.createElement('button');
            playBtn.className = 'play-btn';
            playBtn.dataset.file = filePath;
            playBtn.dataset.index = globalIndex;
            
            const isCurrent = (globalIndex === currentTrackIndex);
            const isPlaying = isCurrent && jplayerInstance && !jplayerInstance.paused;
            playBtn.textContent = isPlaying ? '▶ 播放中' : '▶ 播放';
            if (isPlaying) playBtn.classList.add('playing');

            playBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                const idx = parseInt(this.dataset.index);
                if (!isNaN(idx) && idx >= 0) {
                    playTrack(idx);
                }
            });

            item.appendChild(nameSpan);
            item.appendChild(playBtn);
            fileListEl.appendChild(item);
        }

        pageIndicator.textContent = (page + 1) + ' / ' + (totalPages || 1);
    }

    function updatePagination() {
        const list = getFileList();
        totalPages = Math.ceil(list.length / PAGE_SIZE) || 1;
        prevPageBtn.disabled = currentPage === 0;
        nextPageBtn.disabled = currentPage >= totalPages - 1;
        pageIndicator.textContent = (currentPage + 1) + ' / ' + totalPages;
    }

    function goToPage(page) {
        const list = getFileList();
        totalPages = Math.ceil(list.length / PAGE_SIZE) || 1;
        if (page < 0 || page >= totalPages) return;
        currentPage = page;
        renderPage(currentPage);
        updatePagination();
        document.getElementById('fileListContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ============ 搜索 ============
    function performSearch(query) {
        searchQuery = query.trim().toLowerCase();
        
        if (!searchQuery) {
            filteredFiles = [];
            searchResultsInfo.classList.remove('visible');
            noResults.classList.remove('visible');
            clearSearchBtn.classList.remove('visible');
        } else {
            filteredFiles = allFiles.filter(f => getDisplayName(f).toLowerCase().includes(searchQuery));
            searchResultsInfo.classList.add('visible');
            searchCount.textContent = filteredFiles.length;
            clearSearchBtn.classList.add('visible');
            noResults.classList.toggle('visible', filteredFiles.length === 0);
        }
        
        currentPage = 0;
        totalPages = Math.ceil(getFileList().length / PAGE_SIZE) || 1;
        renderPage(currentPage);
        updatePagination();
        totalBadge.textContent = searchQuery ? filteredFiles.length + ' 首 (筛选)' : allFiles.length + ' 首';
    }

    // ============ jPlayer 播放控制 ============
    function playTrack(index) {
        if (index < 0 || index >= allFiles.length) return;
        const filePath = allFiles[index];
        if (!filePath) return;

        currentTrackIndex = index;
        currentFilePath = filePath;
        currentTrackName.textContent = '🎵 ' + getDisplayName(filePath);

        // 更新列表按钮状态
        document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.play-btn').forEach(btn => {
            const idx = parseInt(btn.dataset.index);
            if (idx === index) {
                btn.closest('.file-item').classList.add('active');
                btn.textContent = '⏳ 加载中';
                btn.disabled = true;
            } else {
                btn.textContent = '▶ 播放';
                btn.disabled = false;
                btn.classList.remove('playing');
            }
        });

        // 获取签名 URL 并播放
        getPresignedUrl(filePath).then(url => {
            if (jplayerInstance) {
                jplayerInstance.jPlayer('setMedia', {
                    mp3: url
                }).jPlayer('play');
            }
        }).catch(err => {
            console.error('播放失败:', err);
            document.querySelectorAll('.play-btn').forEach(btn => {
                const idx = parseInt(btn.dataset.index);
                if (idx === index) {
                    btn.textContent = '▶ 播放';
                    btn.disabled = false;
                }
            });
        });
    }

    function updatePlayBtnState() {
        document.querySelectorAll('.play-btn').forEach(btn => {
            const idx = parseInt(btn.dataset.index);
            if (idx === currentTrackIndex) {
                const isPlaying = jplayerInstance && !jplayerInstance.paused;
                btn.textContent = isPlaying ? '▶ 播放中' : '▶ 播放';
                btn.classList.toggle('playing', isPlaying);
                btn.disabled = false;
                if (isPlaying) {
                    btn.closest('.file-item').classList.add('active');
                }
            }
        });
    }

    function playNext() {
        if (allFiles.length === 0 || currentTrackIndex < 0) return;
        let idx;
        switch (playMode) {
            case 'random':
                do {
                    idx = Math.floor(Math.random() * allFiles.length);
                } while (idx === currentTrackIndex && allFiles.length > 1);
                break;
            case 'repeat-one':
                idx = currentTrackIndex;
                break;
            default:
                idx = currentTrackIndex + 1;
                if (idx >= allFiles.length) idx = 0;
        }
        playTrack(idx);
    }

    function playPrevious() {
        if (allFiles.length === 0 || currentTrackIndex < 0) return;
        let idx;
        if (playMode === 'random') {
            do {
                idx = Math.floor(Math.random() * allFiles.length);
            } while (idx === currentTrackIndex && allFiles.length > 1);
        } else {
            idx = currentTrackIndex - 1;
            if (idx < 0) idx = allFiles.length - 1;
        }
        playTrack(idx);
    }

    function togglePlayMode() {
        const modes = ['sequential', 'random', 'repeat-one'];
        const icons = ['🔁', '🔀', '🔂'];
        const idx = (modes.indexOf(playMode) + 1) % modes.length;
        playMode = modes[idx];
        modeBtn.textContent = icons[idx];
        // 模式按钮高亮
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('mode-active'));
        modeBtn.classList.add('mode-active');
    }

    // ============ 初始化 jPlayer ============
    function initJPlayer() {
        // 销毁旧实例（如果有）
        if (jplayerInstance) {
            try { jplayerInstance.jPlayer('destroy'); } catch(e) {}
        }

        jplayerInstance = $('#jplayer');
        jplayerInstance.jPlayer({
            ready: function() {
                // 可以在这里做加载完成后的操作
            },
            ended: function() {
                // 歌曲播放结束
                if (playMode === 'repeat-one') {
                    // 单曲循环：重新播放
                    if (currentTrackIndex >= 0) {
                        const filePath = allFiles[currentTrackIndex];
                        if (filePath) {
                            getPresignedUrl(filePath).then(url => {
                                jplayerInstance.jPlayer('setMedia', { mp3: url }).jPlayer('play');
                            });
                        }
                    }
                } else {
                    playNext();
                }
            },
            play: function() {
                // 播放开始
                updatePlayBtnState();
                // 更新锁屏信息（iOS）
                if ('mediaSession' in navigator) {
                    navigator.mediaSession.metadata = new MediaMetadata({
                        title: getDisplayName(currentFilePath),
                        artist: 'R2 音乐'
                    });
                    navigator.mediaSession.playbackState = 'playing';
                }
            },
            pause: function() {
                updatePlayBtnState();
                if ('mediaSession' in navigator) {
                    navigator.mediaSession.playbackState = 'paused';
                }
            },
            error: function(event) {
                console.error('jPlayer 错误:', event);
                updatePlayBtnState();
                // 发生错误时尝试播下一首
                if (currentTrackIndex >= 0) {
                    setTimeout(playNext, 1000);
                }
            },
            swfPath: 'https://cdnjs.cloudflare.com/ajax/libs/jplayer/2.9.2/jplayer.swf',
            solution: 'html, flash',
            supplied: 'mp3, m4a, oga',
            wmode: 'window',
            useStateClassSkin: true,
            autoBlur: false,
            smoothPlayBar: true,
            keyEnabled: true,
            remainingDuration: false,
            toggleDuration: false
        });

        // 绑定控制按钮
        // 注意：jPlayer 会自动处理 .jp-play, .jp-pause, .jp-next, .jp-previous 的点击
        // 但我们需要额外绑定 next/previous 逻辑
        $('.jp-next').on('click', function(e) {
            e.preventDefault();
            playNext();
        });
        $('.jp-previous').on('click', function(e) {
            e.preventDefault();
            playPrevious();
        });

        // 模式按钮
        modeBtn.addEventListener('click', togglePlayMode);
        modeBtn.classList.add('mode-active');
    }

    // ============ 分页事件 ============
    function initPagination() {
        prevPageBtn.addEventListener('click', function() {
            if (currentPage > 0) goToPage(currentPage - 1);
        });
        nextPageBtn.addEventListener('click', function() {
            const list = getFileList();
            totalPages = Math.ceil(list.length / PAGE_SIZE) || 1;
            if (currentPage < totalPages - 1) goToPage(currentPage + 1);
        });
    }

    // ============ 搜索事件 ============
    function initSearch() {
        searchInput.addEventListener('input', function(e) {
            performSearch(e.target.value);
        });
        clearSearchBtn.addEventListener('click', function() {
            searchInput.value = '';
            performSearch('');
            searchInput.focus();
        });
    }

    // ============ 启动 ============
    async function init() {
        initPagination();
        initSearch();
        initJPlayer();
        await fetchFileList();
        currentTrackIndex = -1;
        currentTrackName.textContent = '🎧 未选择';
        renderPage(0);
    }

    // 等待 DOM 和 jQuery 都加载完成
    if (document.readyState === 'complete') {
        init();
    } else {
        document.addEventListener('DOMContentLoaded', init);
    }

})();
</script>
</body>
</html>
