<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🎵 R2 音乐播放器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #f5f7fb;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 16px 40px;
        }
        .container {
            max-width: 720px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
            padding: 24px 20px 32px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            width: 100%;
        }
        .search-box input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #e8edf5;
            border-radius: 30px;
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
            background: #f8faff;
            color: #1f2a44;
        }
        .search-box input:focus {
            border-color: #3b82f6;
            background: white;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .search-box input::placeholder {
            color: #8892aa;
        }
        .search-box .clear-btn {
            background: #eef2f7;
            border: none;
            border-radius: 30px;
            padding: 0 18px;
            font-size: 1.2rem;
            cursor: pointer;
            color: #5e6f8d;
            transition: 0.15s;
            display: none;
            align-items: center;
        }
        .search-box .clear-btn:hover {
            background: #dce2ec;
        }
        .search-box .clear-btn.visible {
            display: flex;
        }
        .search-results-info {
            font-size: 0.85rem;
            color: #5e6f8d;
            margin-bottom: 16px;
            display: none;
        }
        .search-results-info.visible {
            display: block;
        }
        .player-card {
            background: #f8faff;
            border-radius: 24px;
            padding: 20px 16px 18px;
            margin-bottom: 28px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02), 0 4px 12px rgba(0,20,50,0.04);
        }
        .now-playing {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }
        .track-name {
            font-weight: 500;
            font-size: 1.1rem;
            color: #0b1e33;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 80%;
        }
        .player-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 4px;
        }
        .player-controls button {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
            color: #1f2a44;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: 0.15s;
        }
        .player-controls button:active {
            transform: scale(0.88);
            background: rgba(0,0,0,0.05);
        }
        .player-controls button.mode-active {
            color: #3b82f6;
        }
        audio {
            width: 100%;
            margin-top: 14px;
            border-radius: 40px;
            outline: none;
            background: #eef2f7;
        }
        .file-list-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin: 18px 0 12px;
        }
        .file-list-header span {
            font-size: 0.95rem;
            color: #1f2a44;
        }
        .badge {
            background: #e8edf5;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #2a3d5e;
        }
        .file-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 6px 0 20px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #ffffff;
            padding: 12px 16px;
            border-radius: 18px;
            border: 1px solid #edf2f9;
            transition: all 0.15s;
        }
        .file-item:active {
            background: #eef4ff;
            border-color: #b3c9ff;
        }
        .file-item.active {
            background: #eef4ff;
            border-color: #3b82f6;
        }
        .file-item .file-name {
            font-size: 0.95rem;
            color: #1f2a44;
            font-weight: 450;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 60%;
        }
        .file-item .file-name .highlight {
            background: #fef3c7;
            padding: 0 2px;
            border-radius: 2px;
        }
        .file-item .play-btn {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            min-width: 70px;
        }
        .file-item .play-btn:active {
            transform: scale(0.94);
            background: #2563eb;
        }
        .file-item .play-btn.playing {
            background: #1e293b;
        }
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .pagination button {
            background: white;
            border: 1px solid #dce2ec;
            padding: 8px 18px;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.9rem;
            color: #1f2a44;
            cursor: pointer;
            transition: 0.12s;
        }
        .pagination button:active {
            background: #eef2f7;
            transform: scale(0.94);
        }
        .pagination button:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .page-indicator {
            font-size: 0.95rem;
            background: #eef2f7;
            padding: 6px 18px;
            border-radius: 40px;
            color: #1a2b44;
            font-weight: 450;
            min-width: 80px;
            text-align: center;
        }
        .loading-spinner {
            text-align: center;
            padding: 30px 0;
            color: #5b6f8d;
        }
        .spinner {
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 3px solid #d0d9e8;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .no-results {
            text-align: center;
            padding: 30px 0;
            color: #8892aa;
            font-size: 0.95rem;
            display: none;
        }
        .no-results.visible {
            display: block;
        }
        @media (max-width: 480px) {
            .container { padding: 16px; }
            .file-item { padding: 10px 12px; }
            .file-item .file-name { max-width: 50%; font-size: 0.9rem; }
            .player-controls { gap: 12px; }
            .player-controls button { font-size: 1.3rem; width: 44px; height: 44px; }
            .search-box input { font-size: 0.9rem; padding: 10px 14px; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 搜索歌曲..." autocomplete="off">
        <button class="clear-btn" id="clearSearchBtn" title="清除搜索">✕</button>
    </div>
    <div class="search-results-info" id="searchResultsInfo">找到 <span id="searchCount">0</span> 首歌曲</div>

    <div class="player-card" id="playerCard">
        <div class="now-playing">
            <span class="track-name" id="currentTrackName">🎧 未选择</span>
        </div>
        <div class="player-controls">
            <button id="modeBtn" title="播放模式">🔁</button>
            <button id="prevBtn" title="上一曲">⏮</button>
            <button id="playPauseBtn" title="播放/暂停">▶</button>
            <button id="nextBtn" title="下一曲">⏭</button>
        </div>
        <audio controls id="audioPlayer" style="width:100%;"></audio>
    </div>

    <div class="file-list-header">
        <span>🎵 歌曲列表</span>
        <span class="badge" id="totalBadge">0 首</span>
    </div>

    <div id="fileListContainer">
        <div class="loading-spinner" id="loadingIndicator">
            <span class="spinner"></span> 加载列表中...
        </div>
        <div id="fileList" class="file-grid" style="display:none;"></div>
        <div class="no-results" id="noResults">😕 没有找到匹配的歌曲</div>
    </div>

    <div class="pagination" id="paginationControls">
        <button id="prevPageBtn" disabled>◀ 上一页</button>
        <span class="page-indicator" id="pageIndicator">1 / 1</span>
        <button id="nextPageBtn" disabled>下一页 ▶</button>
    </div>
</div>

<script>
    (function() {
        "use strict";

        const PAGE_SIZE = 10;

        const fileListEl = document.getElementById('fileList');
        const loadingEl = document.getElementById('loadingIndicator');
        const totalBadge = document.getElementById('totalBadge');
        const audioPlayer = document.getElementById('audioPlayer');
        const currentTrackName = document.getElementById('currentTrackName');

        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const modeBtn = document.getElementById('modeBtn');

        const prevPageBtn = document.getElementById('prevPageBtn');
        const nextPageBtn = document.getElementById('nextPageBtn');
        const pageIndicator = document.getElementById('pageIndicator');

        const searchInput = document.getElementById('searchInput');
        const clearSearchBtn = document.getElementById('clearSearchBtn');
        const searchResultsInfo = document.getElementById('searchResultsInfo');
        const searchCount = document.getElementById('searchCount');
        const noResults = document.getElementById('noResults');

        let allFiles = [];
        let filteredFiles = [];
        let currentPage = 0;
        let totalPages = 0;
        let currentTrackIndex = -1;
        let isPlaying = false;
        let searchQuery = '';
        let playMode = 'sequential';
        
        const audioCache = new Map();

        function getDisplayName(fullPath) {
            if (!fullPath) return '未知';
            const parts = fullPath.split('/');
            return parts[parts.length - 1] || fullPath;
        }

        function getFileExtension(filename) {
            return filename.split('.').pop().toLowerCase();
        }

        function getMimeType(filename) {
            const ext = getFileExtension(filename);
            const mimeMap = {
                'mp3': 'audio/mpeg',
                'm4a': 'audio/mp4',
                'aac': 'audio/aac',
                'flac': 'audio/flac',
                'wav': 'audio/wav',
                'ogg': 'audio/ogg',
                'opus': 'audio/opus'
            };
            return mimeMap[ext] || 'audio/mpeg';
        }

        function clearAudioCache() {
            for (const [key, blobUrl] of audioCache) {
                try { URL.revokeObjectURL(blobUrl); } catch(e) {}
            }
            audioCache.clear();
        }

        function getCurrentFileList() {
            return searchQuery ? filteredFiles : allFiles;
        }

        function performSearch(query) {
            searchQuery = query.trim().toLowerCase();
            
            if (!searchQuery) {
                filteredFiles = [];
                searchResultsInfo.classList.remove('visible');
                noResults.classList.remove('visible');
                clearSearchBtn.classList.remove('visible');
            } else {
                filteredFiles = allFiles.filter(file => 
                    getDisplayName(file).toLowerCase().includes(searchQuery)
                );
                searchResultsInfo.classList.add('visible');
                searchCount.textContent = filteredFiles.length;
                clearSearchBtn.classList.add('visible');
                
                if (filteredFiles.length === 0) {
                    noResults.classList.add('visible');
                } else {
                    noResults.classList.remove('visible');
                }
            }
            
            currentPage = 0;
            const fileList = getCurrentFileList();
            totalPages = Math.ceil(fileList.length / PAGE_SIZE) || 1;
            renderPage(currentPage);
            updatePaginationButtons();
            
            if (searchQuery) {
                totalBadge.textContent = filteredFiles.length + ' 首 (筛选)';
            } else {
                totalBadge.textContent = allFiles.length + ' 首';
            }
        }

        async function fetchFileList() {
            loadingEl.style.display = 'block';
            fileListEl.style.display = 'none';

            const response = await fetch('/api/music?action=list&t=' + Date.now());
            const data = await response.json();
            allFiles = data.files.filter(f => typeof f === 'string' && f.trim().length > 0);
            allFiles.sort((a, b) => a.localeCompare(b));

            totalBadge.textContent = allFiles.length + ' 首';
            currentPage = 0;
            totalPages = Math.ceil(allFiles.length / PAGE_SIZE);
            renderPage(currentPage);
            updatePaginationButtons();

            loadingEl.style.display = 'none';
            fileListEl.style.display = 'flex';
        }

        function renderPage(page) {
            const fileList = getCurrentFileList();
            const start = page * PAGE_SIZE;
            const end = Math.min(start + PAGE_SIZE, fileList.length);
            const pageFiles = fileList.slice(start, end);

            fileListEl.innerHTML = '';
            if (pageFiles.length === 0) {
                fileListEl.innerHTML = '<div style="padding:20px;text-align:center;color:#6b7f9f;">没有歌曲</div>';
                return;
            }

            for (const filePath of pageFiles) {
                const displayName = getDisplayName(filePath);
                const globalIndex = allFiles.indexOf(filePath);
                const item = document.createElement('div');
                item.className = 'file-item';
                if (globalIndex === currentTrackIndex) {
                    item.classList.add('active');
                }

                const nameSpan = document.createElement('span');
                nameSpan.className = 'file-name';
                nameSpan.title = filePath;
                
                if (searchQuery) {
                    const lowerName = displayName.toLowerCase();
                    const index = lowerName.indexOf(searchQuery);
                    if (index !== -1) {
                        const before = displayName.substring(0, index);
                        const match = displayName.substring(index, index + searchQuery.length);
                        const after = displayName.substring(index + searchQuery.length);
                        nameSpan.innerHTML = before + '<span class="highlight">' + match + '</span>' + after;
                    } else {
                        nameSpan.textContent = displayName;
                    }
                } else {
                    nameSpan.textContent = displayName;
                }

                const playBtn = document.createElement('button');
                playBtn.className = 'play-btn';
                playBtn.dataset.file = filePath;
                playBtn.dataset.index = globalIndex;
                playBtn.textContent = (globalIndex === currentTrackIndex && isPlaying) ? '▶ 播放中' : '▶ 播放';

                playBtn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const index = parseInt(playBtn.dataset.index);
                    if (!isNaN(index) && index >= 0) {
                        await playTrack(index, playBtn);
                    }
                });

                item.appendChild(nameSpan);
                item.appendChild(playBtn);
                fileListEl.appendChild(item);
            }

            pageIndicator.textContent = `${page + 1} / ${totalPages || 1}`;
        }

        async function getPresignedUrl(filePath) {
            const resp = await fetch('/api/music?action=sign&file=' + encodeURIComponent(filePath) + '&t=' + Date.now());
            const data = await resp.json();
            return data.url;
        }

        async function downloadAndCache(filePath) {
            const url = await getPresignedUrl(filePath);
            const audioResp = await fetch(url);
            const audioData = await audioResp.arrayBuffer();
            const mimeType = getMimeType(filePath);
            const blob = new Blob([audioData], { type: mimeType });
            const blobUrl = URL.createObjectURL(blob);
            audioCache.set(filePath, blobUrl);
            return blobUrl;
        }

        async function getAudioSource(filePath, isFirstPlay) {
            if (audioCache.has(filePath)) {
                return audioCache.get(filePath);
            }
            
            if (isFirstPlay) {
                return await getPresignedUrl(filePath);
            } else {
                return await downloadAndCache(filePath);
            }
        }

        async function playTrack(index, btnElement) {
            if (index < 0 || index >= allFiles.length) {
                return;
            }
            
            const filePath = allFiles[index];
            if (!filePath) {
                return;
            }
            
            if (currentTrackIndex !== -1 && currentTrackIndex !== index) {
                clearAudioCache();
            }
            
            currentTrackIndex = index;
            
            document.querySelectorAll('.file-item').forEach((el) => {
                const btn = el.querySelector('.play-btn');
                if (btn) {
                    const idx = parseInt(btn.dataset.index);
                    el.classList.toggle('active', idx === index);
                }
            });
            
            document.querySelectorAll('.play-btn').forEach(b => {
                const idx = parseInt(b.dataset.index);
                if (idx === index) {
                    b.textContent = '⏳ 加载中';
                    b.disabled = true;
                } else {
                    b.textContent = '▶ 播放';
                    b.disabled = false;
                    b.classList.remove('playing');
                }
            });

            const isFirstPlay = !audioCache.has(filePath);
            const source = await getAudioSource(filePath, isFirstPlay);
            
            audioPlayer.src = source;
            audioPlayer.load();
            
            await new Promise((resolve, reject) => {
                let resolved = false;
                const timeout = setTimeout(() => {
                    if (!resolved) {
                        resolved = true;
                        reject(new Error('加载超时'));
                    }
                }, 8000);
                
                const onReady = () => {
                    if (!resolved) {
                        resolved = true;
                        clearTimeout(timeout);
                        audioPlayer.removeEventListener('canplay', onReady);
                        audioPlayer.removeEventListener('loadeddata', onReady);
                        resolve();
                    }
                };
                
                if (audioPlayer.readyState >= 3) {
                    resolved = true;
                    clearTimeout(timeout);
                    resolve();
                    return;
                }
                
                audioPlayer.addEventListener('canplay', onReady);
                audioPlayer.addEventListener('loadeddata', onReady);
            });
            
            await audioPlayer.play();
            
            currentTrackName.textContent = '🎵 ' + getDisplayName(filePath);
            updatePlayPauseButton(true);
            isPlaying = true;
            document.querySelectorAll('.play-btn').forEach(b => {
                const idx = parseInt(b.dataset.index);
                b.textContent = idx === index ? '▶ 播放中' : '▶ 播放';
                b.disabled = false;
                b.classList.toggle('playing', idx === index);
            });

            if (isFirstPlay && !audioCache.has(filePath)) {
                downloadAndCache(filePath).catch(() => {});
            }
        }

        function togglePlayPause() {
            if (audioPlayer.paused) {
                audioPlayer.play().catch(() => {});
                updatePlayPauseButton(true);
                isPlaying = true;
                document.querySelectorAll('.play-btn').forEach(b => {
                    const idx = parseInt(b.dataset.index);
                    if (idx === currentTrackIndex) {
                        b.textContent = '▶ 播放中';
                        b.classList.add('playing');
                    }
                });
            } else {
                audioPlayer.pause();
                updatePlayPauseButton(false);
                isPlaying = false;
                document.querySelectorAll('.play-btn').forEach(b => {
                    const idx = parseInt(b.dataset.index);
                    if (idx === currentTrackIndex) {
                        b.textContent = '▶ 播放';
                        b.classList.remove('playing');
                    }
                });
            }
        }

        function updatePlayPauseButton(playing) {
            playPauseBtn.textContent = playing ? '⏸' : '▶';
        }

        function playPrevious() {
            if (allFiles.length === 0 || currentTrackIndex < 0) return;
            let newIndex;
            if (playMode === 'random') {
                newIndex = getRandomTrack();
            } else {
                newIndex = currentTrackIndex - 1;
                if (newIndex < 0) newIndex = allFiles.length - 1;
            }
            if (newIndex !== currentTrackIndex) {
                clearAudioCache();
            }
            playTrack(newIndex);
        }

        function playNext() {
            if (allFiles.length === 0 || currentTrackIndex < 0) return;
            let newIndex;
            if (playMode === 'random') {
                newIndex = getRandomTrack();
            } else if (playMode === 'repeat-one') {
                newIndex = currentTrackIndex;
            } else {
                newIndex = currentTrackIndex + 1;
                if (newIndex >= allFiles.length) newIndex = 0;
            }
            if (newIndex !== currentTrackIndex) {
                clearAudioCache();
            }
            playTrack(newIndex);
        }

        function getRandomTrack() {
            if (allFiles.length === 0) return -1;
            let index;
            do {
                index = Math.floor(Math.random() * allFiles.length);
            } while (index === currentTrackIndex && allFiles.length > 1);
            return index;
        }

        function togglePlayMode() {
            const modes = ['sequential', 'random', 'repeat-one'];
            const icons = ['🔁', '🔀', '🔂'];
            
            const currentIdx = modes.indexOf(playMode);
            const nextIdx = (currentIdx + 1) % modes.length;
            playMode = modes[nextIdx];
            
            modeBtn.textContent = icons[nextIdx];
            
            document.querySelectorAll('.player-controls button').forEach(b => b.classList.remove('mode-active'));
            modeBtn.classList.add('mode-active');
        }

        function setupAudioEvents() {
            audioPlayer.addEventListener('ended', () => {
                if (playMode === 'repeat-one') {
                    if (currentTrackIndex >= 0) {
                        const filePath = allFiles[currentTrackIndex];
                        if (audioCache.has(filePath)) {
                            audioPlayer.currentTime = 0;
                            audioPlayer.play().catch(() => {});
                        } else {
                            playTrack(currentTrackIndex);
                        }
                    }
                } else {
                    playNext();
                }
            });

            playPauseBtn.addEventListener('click', togglePlayPause);
            prevBtn.addEventListener('click', playPrevious);
            nextBtn.addEventListener('click', playNext);
            modeBtn.addEventListener('click', togglePlayMode);
            
            audioPlayer.addEventListener('play', () => {
                updatePlayPauseButton(true);
                isPlaying = true;
            });
            
            audioPlayer.addEventListener('pause', () => {
                updatePlayPauseButton(false);
                isPlaying = false;
            });
        }

        function setupSearchEvents() {
            searchInput.addEventListener('input', (e) => {
                performSearch(e.target.value);
            });
            
            clearSearchBtn.addEventListener('click', () => {
                searchInput.value = '';
                performSearch('');
                searchInput.focus();
            });
        }

        function goToPage(page) {
            const fileList = getCurrentFileList();
            totalPages = Math.ceil(fileList.length / PAGE_SIZE) || 1;
            if (page < 0 || page >= totalPages) return;
            currentPage = page;
            renderPage(currentPage);
            updatePaginationButtons();
            document.getElementById('fileListContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function updatePaginationButtons() {
            const fileList = getCurrentFileList();
            totalPages = Math.ceil(fileList.length / PAGE_SIZE) || 1;
            prevPageBtn.disabled = currentPage === 0;
            nextPageBtn.disabled = currentPage >= totalPages - 1;
            pageIndicator.textContent = `${currentPage + 1} / ${totalPages || 1}`;
        }

        function initPaginationEvents() {
            prevPageBtn.addEventListener('click', () => {
                if (currentPage > 0) goToPage(currentPage - 1);
            });
            nextPageBtn.addEventListener('click', () => {
                const fileList = getCurrentFileList();
                totalPages = Math.ceil(fileList.length / PAGE_SIZE) || 1;
                if (currentPage < totalPages - 1) goToPage(currentPage + 1);
            });
        }

        async function init() {
            initPaginationEvents();
            setupAudioEvents();
            setupSearchEvents();
            
            modeBtn.textContent = '🔁';
            modeBtn.classList.add('mode-active');
            
            await fetchFileList();
            
            if (allFiles.length > 0) {
                currentTrackIndex = 0;
                currentTrackName.textContent = '🎵 ' + getDisplayName(allFiles[0]);
                renderPage(currentPage);
            }
        }

        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            init();
        } else {
            document.addEventListener('DOMContentLoaded', init);
        }

    })();
</script>

</body>
</html>
