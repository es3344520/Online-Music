<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🎵 R2 音乐播放器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #f5f7fb;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 16px 40px;
        }
        .container {
            max-width: 720px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
            padding: 24px 20px 32px;
            transition: all 0.2s;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #0b1e33;
            letter-spacing: -0.3px;
            margin-bottom: 8px;
        }
        .sub {
            color: #5e6f8d;
            font-size: 0.9rem;
            margin-bottom: 24px;
            border-left: 3px solid #3b82f6;
            padding-left: 14px;
            background: #f0f4fe;
            border-radius: 0 12px 12px 0;
            line-height: 1.5;
        }
        .ios-tip {
            background: #fef3c7;
            padding: 10px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            color: #92400e;
            display: none;
            border-left: 4px solid #f59e0b;
        }
        .player-card {
            background: #f8faff;
            border-radius: 24px;
            padding: 18px 16px 16px;
            margin-bottom: 28px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02), 0 4px 12px rgba(0,20,50,0.04);
        }
        .now-playing {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .track-name {
            flex: 1;
            font-weight: 500;
            font-size: 1.1rem;
            color: #0b1e33;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }
        .track-name-small {
            font-size: 0.9rem;
            color: #3d4e6b;
        }
        audio {
            width: 100%;
            margin-top: 12px;
            border-radius: 40px;
            outline: none;
            background: #eef2f7;
        }
        .file-list-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin: 18px 0 12px;
        }
        .file-list-header h2 {
            font-size: 1.2rem;
            font-weight: 500;
            color: #1f2a44;
        }
        .badge {
            background: #e8edf5;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #2a3d5e;
        }
        .file-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 6px 0 20px;
            max-height: 460px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #ffffff;
            padding: 12px 16px;
            border-radius: 18px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.02);
            border: 1px solid #edf2f9;
            transition: all 0.15s;
            cursor: default;
        }
        .file-item:active {
            background: #eef4ff;
            border-color: #b3c9ff;
        }
        .file-name {
            font-size: 0.95rem;
            color: #1f2a44;
            font-weight: 450;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 60%;
        }
        .play-btn {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 2px 6px rgba(59, 130, 246, 0.25);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .play-btn:active {
            transform: scale(0.94);
            background: #2563eb;
        }
        .play-btn.playing {
            background: #1e293b;
            box-shadow: none;
        }
        .play-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .pagination button {
            background: white;
            border: 1px solid #dce2ec;
            padding: 8px 18px;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.9rem;
            color: #1f2a44;
            cursor: pointer;
            transition: 0.12s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        .pagination button:active {
            background: #eef2f7;
            transform: scale(0.94);
        }
        .pagination button:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .page-indicator {
            font-size: 0.95rem;
            background: #eef2f7;
            padding: 6px 18px;
            border-radius: 40px;
            color: #1a2b44;
            font-weight: 450;
            min-width: 80px;
            text-align: center;
        }
        .loading-spinner {
            text-align: center;
            padding: 30px 0;
            color: #5b6f8f;
            font-weight: 400;
        }
        .spinner {
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 3px solid #d0d9e8;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error-msg {
            background: #fee9e9;
            color: #b3403a;
            padding: 12px 16px;
            border-radius: 20px;
            margin: 10px 0;
            font-size: 0.9rem;
            border-left: 4px solid #e54848;
        }
        .footer-note {
            margin-top: 28px;
            font-size: 0.8rem;
            color: #8892aa;
            text-align: center;
            border-top: 1px solid #e9eef5;
            padding-top: 20px;
        }
        @media (max-width: 480px) {
            .container { padding: 16px; }
            .file-item { padding: 10px 12px; }
            .file-name { max-width: 50%; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>📻 音乐库</h1>
    <div class="sub">✦ 来自 R2 存储 · 每次加载 10 首</div>

    <!-- iOS 提示 -->
    <div class="ios-tip" id="iosTip">
        💡 如果无法播放，请点击屏幕任意位置激活音频，然后重试
    </div>

    <!-- 播放器卡片 -->
    <div class="player-card" id="playerCard">
        <div class="now-playing">
            <span class="track-name" id="currentTrackName">🎧 未选择</span>
            <span style="font-size:0.8rem; color:#6b7f9f;">点击歌曲播放</span>
        </div>
        <audio controls id="audioPlayer" style="width:100%;"></audio>
    </div>

    <!-- 文件列表 + 分页 -->
    <div class="file-list-header">
        <h2>🎵 所有歌曲</h2>
        <span class="badge" id="totalBadge">0 首</span>
    </div>

    <div id="fileListContainer">
        <div class="loading-spinner" id="loadingIndicator">
            <span class="spinner"></span> 加载列表中...
        </div>
        <div id="fileList" class="file-grid" style="display:none;"></div>
        <div id="errorMessage" class="error-msg" style="display:none;"></div>
    </div>

    <!-- 分页控件 -->
    <div class="pagination" id="paginationControls">
        <button id="prevPageBtn" disabled>◀ 上一页</button>
        <span class="page-indicator" id="pageIndicator">1 / 1</span>
        <button id="nextPageBtn" disabled>下一页 ▶</button>
    </div>
    <div class="footer-note">🔒 预签名链接 · 每次请求安全播放</div>
</div>

<script>
    (function() {
        "use strict";

        // ---------- 配置 ----------
        const PAGE_SIZE = 10;

        // DOM 元素
        const fileListEl = document.getElementById('fileList');
        const loadingEl = document.getElementById('loadingIndicator');
        const errorMsgEl = document.getElementById('errorMessage');
        const totalBadge = document.getElementById('totalBadge');
        const audioPlayer = document.getElementById('audioPlayer');
        const currentTrackName = document.getElementById('currentTrackName');
        const iosTip = document.getElementById('iosTip');

        const prevBtn = document.getElementById('prevPageBtn');
        const nextBtn = document.getElementById('nextPageBtn');
        const pageIndicator = document.getElementById('pageIndicator');

        // 状态
        let allFiles = [];
        let currentPage = 0;
        let totalPages = 0;
        let isPlaying = false;
        let globalAudioContext = null;

        // 预签名链接缓存
        const presignedCache = new Map();

        // ---------- 检测移动端 Safari ----------
        const isMobileSafari = /iPad|iPhone|iPod/.test(navigator.userAgent) && /WebKit/.test(navigator.userAgent);
        if (isMobileSafari) {
            iosTip.style.display = 'block';
        }

        // ---------- 初始化 AudioContext (用户手势) ----------
        function initAudioContext() {
            if (!globalAudioContext) {
                try {
                    globalAudioContext = new (window.AudioContext || window.webkitAudioContext)();
                    if (globalAudioContext.state === 'suspended') {
                        globalAudioContext.resume();
                    }
                    console.log('AudioContext initialized');
                } catch (e) {
                    console.log('AudioContext init error:', e);
                }
            }
            return globalAudioContext;
        }

        // 点击页面任意位置激活音频
        document.addEventListener('click', function initAudioOnClick() {
            initAudioContext();
        }, { once: true });

        // 触摸设备支持
        document.addEventListener('touchstart', function initAudioOnTouch() {
            initAudioContext();
        }, { once: true });

        // ---------- 辅助函数 ----------
        function showError(msg) {
            errorMsgEl.style.display = 'block';
            errorMsgEl.textContent = '❌ ' + msg;
            loadingEl.style.display = 'none';
            fileListEl.style.display = 'none';
        }

        function hideError() {
            errorMsgEl.style.display = 'none';
        }

        function getDisplayName(fullPath) {
            if (!fullPath) return '未知';
            const parts = fullPath.split('/');
            return parts[parts.length - 1] || fullPath;
        }

        // ---------- 获取文件列表 ----------
        async function fetchFileList() {
            loadingEl.style.display = 'block';
            fileListEl.style.display = 'none';
            hideError();

            try {
                const response = await fetch('/api/music?action=list&t=' + Date.now());
                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(`服务器错误 (${response.status}): ${errText || response.statusText}`);
                }
                const data = await response.json();
                if (!data.success) {
                    throw new Error(data.message || '获取列表失败');
                }
                if (!Array.isArray(data.files)) {
                    throw new Error('返回数据格式异常');
                }
                allFiles = data.files.filter(f => typeof f === 'string' && f.trim().length > 0);
                allFiles.sort((a, b) => a.localeCompare(b));

                if (allFiles.length === 0) {
                    throw new Error('R2 存储中暂无音乐文件');
                }

                totalBadge.textContent = allFiles.length + ' 首';
                currentPage = 0;
                totalPages = Math.ceil(allFiles.length / PAGE_SIZE);
                renderPage(currentPage);
                updatePaginationButtons();

                loadingEl.style.display = 'none';
                fileListEl.style.display = 'flex';

            } catch (err) {
                console.error('[fetchFileList]', err);
                showError(err.message || '无法加载音乐列表，请检查网络或配置');
                loadingEl.style.display = 'none';
                fileListEl.style.display = 'none';
                totalBadge.textContent = '0 首';
            }
        }

        // ---------- 渲染分页 ----------
        function renderPage(page) {
            const start = page * PAGE_SIZE;
            const end = Math.min(start + PAGE_SIZE, allFiles.length);
            const pageFiles = allFiles.slice(start, end);

            fileListEl.innerHTML = '';
            if (pageFiles.length === 0) {
                fileListEl.innerHTML = '<div style="padding:20px;text-align:center;color:#6b7f9f;">没有歌曲</div>';
                return;
            }

            for (const filePath of pageFiles) {
                const displayName = getDisplayName(filePath);
                const item = document.createElement('div');
                item.className = 'file-item';

                const nameSpan = document.createElement('span');
                nameSpan.className = 'file-name';
                nameSpan.title = filePath;
                nameSpan.textContent = displayName;

                const playBtn = document.createElement('button');
                playBtn.className = 'play-btn';
                playBtn.dataset.file = filePath;
                playBtn.textContent = '▶ 播放';

                playBtn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    // 点击播放按钮时确保 AudioContext 已激活
                    initAudioContext();
                    const file = playBtn.dataset.file;
                    await playFile(file, playBtn);
                });

                item.appendChild(nameSpan);
                item.appendChild(playBtn);
                fileListEl.appendChild(item);
            }

            pageIndicator.textContent = `${page + 1} / ${totalPages || 1}`;
        }

        // ---------- 备用播放方案 ----------
        function handlePlaybackFallback(url, filePath, btnElement) {
            try {
                const audio = new Audio(url);
                const playPromise = audio.play();
                if (playPromise !== undefined) {
                    playPromise
                        .then(() => {
                            currentTrackName.textContent = '🎵 ' + getDisplayName(filePath);
                            if (btnElement) {
                                btnElement.textContent = '▶ 播放中';
                                btnElement.classList.add('playing');
                                btnElement.disabled = false;
                            }
                            // 同步到主播放器
                            audioPlayer.src = url;
                            audioPlayer.load();
                            isPlaying = true;
                            
                            // 更新所有按钮状态
                            document.querySelectorAll('.play-btn').forEach(b => {
                                if (b !== btnElement) {
                                    b.textContent = '▶ 播放';
                                    b.classList.remove('playing');
                                    b.disabled = false;
                                }
                            });
                        })
                        .catch(err => {
                            console.error('Fallback play error:', err);
                            alert('播放失败，请尝试刷新页面或点击页面空白处后重试');
                            if (btnElement) {
                                btnElement.textContent = '▶ 播放';
                                btnElement.disabled = false;
                                btnElement.classList.remove('playing');
                            }
                        });
                }
            } catch (e) {
                console.error('Fallback error:', e);
                if (btnElement) {
                    btnElement.textContent = '▶ 播放';
                    btnElement.disabled = false;
                }
            }
        }

        // ---------- 播放指定文件 ----------
        async function playFile(filePath, btnElement) {
            if (!filePath) return;

            // 显示加载状态
            if (btnElement) {
                btnElement.textContent = '⏳ 加载中';
                btnElement.disabled = true;
            }

            try {
                // 确保 AudioContext 已激活
                const audioCtx = initAudioContext();
                
                // 检查缓存
                let presignedUrl = presignedCache.get(filePath);
                if (!presignedUrl) {
                    const resp = await fetch('/api/music?action=sign&file=' + encodeURIComponent(filePath) + '&t=' + Date.now());
                    if (!resp.ok) {
                        const errMsg = await resp.text();
                        throw new Error(`获取播放链接失败 (${resp.status}): ${errMsg || resp.statusText}`);
                    }
                    const data = await resp.json();
                    if (!data.success || !data.url) {
                        throw new Error(data.message || '预签名链接无效');
                    }
                    presignedUrl = data.url;
                    presignedCache.set(filePath, presignedUrl);
                }

                // 设置音频源
                audioPlayer.src = presignedUrl;
                audioPlayer.load();
                
                // 尝试播放
                const playPromise = audioPlayer.play();
                if (playPromise !== undefined) {
                    playPromise
                        .then(() => {
                            // 播放成功
                            currentTrackName.textContent = '🎵 ' + getDisplayName(filePath);
                            document.querySelectorAll('.play-btn').forEach(b => {
                                b.textContent = '▶ 播放';
                                b.disabled = false;
                                b.classList.remove('playing');
                            });
                            if (btnElement) {
                                btnElement.textContent = '▶ 播放中';
                                btnElement.classList.add('playing');
                            }
                            isPlaying = true;
                            
                            // 关闭 AudioContext (可选)
                            if (audioCtx && audioCtx.state !== 'closed') {
                                audioCtx.close().catch(() => {});
                            }
                        })
                        .catch(error => {
                            console.warn('Primary play failed, using fallback:', error);
                            // 使用备用方案
                            handlePlaybackFallback(presignedUrl, filePath, btnElement);
                        });
                }

            } catch (err) {
                console.error('[playFile]', err);
                alert('播放失败: ' + (err.message || '未知错误'));
                if (btnElement) {
                    btnElement.textContent = '▶ 播放';
                    btnElement.disabled = false;
                    btnElement.classList.remove('playing');
                }
                if (audioPlayer.src) {
                    audioPlayer.pause();
                    audioPlayer.src = '';
                }
                currentTrackName.textContent = '⚠️ 播放失败';
            }
        }

        // ---------- 分页控制 ----------
        function goToPage(page) {
            if (page < 0 || page >= totalPages) return;
            currentPage = page;
            renderPage(currentPage);
            updatePaginationButtons();
            document.getElementById('fileListContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function updatePaginationButtons() {
            prevBtn.disabled = currentPage === 0;
            nextBtn.disabled = currentPage >= totalPages - 1;
            pageIndicator.textContent = `${currentPage + 1} / ${totalPages || 1}`;
        }

        // ---------- 初始化 ----------
        function initPaginationEvents() {
            prevBtn.addEventListener('click', () => {
                if (currentPage > 0) goToPage(currentPage - 1);
            });
            nextBtn.addEventListener('click', () => {
                if (currentPage < totalPages - 1) goToPage(currentPage + 1);
            });
        }

        async function init() {
            initPaginationEvents();
            await fetchFileList();
            
            if (totalPages <= 1) {
                prevBtn.disabled = true;
                nextBtn.disabled = true;
            }

            audioPlayer.addEventListener('ended', () => {
                document.querySelectorAll('.play-btn').forEach(b => {
                    b.textContent = '▶ 播放';
                    b.classList.remove('playing');
                    b.disabled = false;
                });
                currentTrackName.textContent = '🎧 已结束';
            });

            audioPlayer.addEventListener('error', () => {
                document.querySelectorAll('.play-btn').forEach(b => {
                    b.textContent = '▶ 播放';
                    b.disabled = false;
                    b.classList.remove('playing');
                });
                currentTrackName.textContent = '⚠️ 加载失败';
            });
        }

        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            init();
        } else {
            document.addEventListener('DOMContentLoaded', init);
        }

    })();
</script>

</body>
</html>
