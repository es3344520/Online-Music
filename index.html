<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>音乐播放器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 700;
        }
        
        .player-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .now-playing {
            text-align: center;
            color: #666;
            margin-bottom: 15px;
        }
        
        .now-playing .song-name {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin: 10px 0;
        }
        
        .audio-controls {
            width: 100%;
        }
        
        .audio-controls audio {
            width: 100%;
            border-radius: 8px;
        }
        
        .file-list {
            margin-top: 20px;
        }
        
        .file-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .file-list-header h2 {
            font-size: 18px;
            color: #333;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            margin-bottom: 8px;
            background: white;
            border-radius: 8px;
            transition: all 0.3s ease;
            border: 1px solid #e9ecef;
            cursor: pointer;
        }
        
        .file-item:hover {
            background: #f1f3f5;
            transform: translateX(5px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .file-item .file-name {
            flex: 1;
            color: #333;
            font-size: 14px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .file-item .file-size {
            color: #999;
            font-size: 12px;
            margin-left: 15px;
        }
        
        .file-item .play-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.3s;
            margin-left: 10px;
        }
        
        .file-item .play-btn:hover {
            background: #5a67d8;
        }
        
        .file-item.playing {
            background: #e8f0fe;
            border-color: #667eea;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            padding: 15px 0;
        }
        
        .pagination button {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .pagination button:hover:not(:disabled) {
            background: #5a67d8;
            transform: scale(1.05);
        }
        
        .pagination button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .pagination .page-info {
            color: #666;
            font-size: 14px;
        }
        
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            text-align: center;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }
            
            .file-item {
                padding: 10px 12px;
            }
            
            .file-item .file-name {
                font-size: 13px;
            }
            
            .pagination button {
                padding: 6px 16px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 音乐播放器</h1>
        
        <div class="player-section">
            <div class="now-playing">
                <div style="font-size: 14px; color: #999;">正在播放</div>
                <div class="song-name" id="currentSong">未选择歌曲</div>
            </div>
            <div class="audio-controls">
                <audio id="audioPlayer" controls>
                    您的浏览器不支持音频播放
                </audio>
            </div>
        </div>
        
        <div class="file-list">
            <div class="file-list-header">
                <h2>📁 音乐列表</h2>
                <span style="color: #999; font-size: 14px;" id="totalCount"></span>
            </div>
            <div id="fileList">
                <div class="loading">加载中...</div>
            </div>
            <div class="pagination" id="pagination">
                <button id="prevPage" onclick="changePage(-1)">上一页</button>
                <span class="page-info" id="pageInfo">第 1 页</span>
                <button id="nextPage" onclick="changePage(1)">下一页</button>
            </div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let totalPages = 1;
        let currentPlaying = null;
        const audioPlayer = document.getElementById('audioPlayer');
        const currentSong = document.getElementById('currentSong');
        
        // 格式化文件大小
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            return (bytes / (1024 * 1024 * 1024)).toFixed(1) + ' GB';
        }
        
        // 加载文件列表
        async function loadFiles(page = 1) {
            try {
                const response = await fetch(`/api/list?page=${page}`);
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }
                
                currentPage = data.page;
                totalPages = data.total_pages || 1;
                
                // 更新总数显示
                document.getElementById('totalCount').textContent = `共 ${data.total} 首歌曲`;
                
                // 渲染文件列表
                const fileList = document.getElementById('fileList');
                if (data.files && data.files.length > 0) {
                    fileList.innerHTML = data.files.map(file => `
                        <div class="file-item ${currentPlaying === file.key ? 'playing' : ''}" 
                             onclick="playSong('${file.key}', '${file.name}')">
                            <span class="file-name">${escapeHtml(file.name)}</span>
                            <span class="file-size">${formatSize(file.size)}</span>
                            <button class="play-btn" onclick="event.stopPropagation(); playSong('${file.key}', '${file.name}')">
                                ${currentPlaying === file.key ? '⏸️' : '▶️'}
                            </button>
                        </div>
                    `).join('');
                } else {
                    fileList.innerHTML = '<div class="loading">没有找到音乐文件</div>';
                }
                
                // 更新分页信息
                document.getElementById('pageInfo').textContent = `第 ${currentPage} / ${totalPages} 页`;
                document.getElementById('prevPage').disabled = currentPage <= 1;
                document.getElementById('nextPage').disabled = currentPage >= totalPages;
                
            } catch (error) {
                document.getElementById('fileList').innerHTML = `
                    <div class="error-message">加载失败: ${error.message}</div>
                `;
            }
        }
        
        // HTML转义防止XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 播放歌曲
        async function playSong(fileKey, fileName) {
            try {
                currentSong.textContent = '加载中...';
                
                const response = await fetch(`/api/stream?file=${encodeURIComponent(fileKey)}`);
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }
                
                // 设置音频源
                audioPlayer.src = data.url;
                audioPlayer.play();
                
                currentSong.textContent = fileName;
                currentPlaying = fileKey;
                
                // 更新列表高亮
                document.querySelectorAll('.file-item').forEach(item => {
                    item.classList.remove('playing');
                    const btn = item.querySelector('.play-btn');
                    if (btn) btn.textContent = '▶️';
                });
                
                document.querySelectorAll('.file-item').forEach(item => {
                    if (item.querySelector(`[onclick*="${fileKey}"]`)) {
                        item.classList.add('playing');
                        const btn = item.querySelector('.play-btn');
                        if (btn) btn.textContent = '⏸️';
                    }
                });
                
                // 更新所有播放按钮状态
                document.querySelectorAll('.file-item .play-btn').forEach(btn => {
                    if (btn.closest('.file-item').classList.contains('playing')) {
                        btn.textContent = '⏸️';
                    }
                });
                
            } catch (error) {
                currentSong.textContent = '播放失败';
                alert('播放失败: ' + error.message);
            }
        }
        
        // 翻页
        function changePage(delta) {
            const newPage = currentPage + delta;
            if (newPage >= 1 && newPage <= totalPages) {
                loadFiles(newPage);
            }
        }
        
        // 音频事件监听
        audioPlayer.addEventListener('ended', () => {
            currentSong.textContent = '播放结束';
            currentPlaying = null;
            document.querySelectorAll('.file-item .play-btn').forEach(btn => {
                btn.textContent = '▶️';
            });
            document.querySelectorAll('.file-item').forEach(item => {
                item.classList.remove('playing');
            });
        });
        
        audioPlayer.addEventListener('error', () => {
            currentSong.textContent = '播放错误';
        });
        
        // 页面加载
        loadFiles(1);
    </script>
</body>
</html>
